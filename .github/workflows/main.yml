<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>당근 마이페이지</title>
    <link rel="stylesheet" href="./daangn.css" />
  </head>
  <body>
    <main class="app-shell" aria-label="당근 마이페이지">
      <section class="phone-frame">
        <div class="status-bar" aria-hidden="true">
          <span>8:08</span>
          <div class="system-icons">
            <span class="signal"></span>
            <span class="wifi"></span>
            <span class="battery"></span>
          </div>
        </div>

        <header class="page-header">
          <h1>나의 당근</h1>
          <button class="icon-button" type="button" aria-label="설정">
            <svg viewBox="0 0 32 32" aria-hidden="true">
              <path d="M16 20.6a4.6 4.6 0 1 0 0-9.2 4.6 4.6 0 0 0 0 9.2Z" fill="none" stroke="currentColor" stroke-width="2.5" />
              <path d="M18.9 3.4 20 6.7c.8.3 1.5.7 2.2 1.2l3.4-.7 2.9 5-2.4 2.6c.1.8.1 1.6 0 2.4l2.4 2.6-2.9 5-3.4-.7c-.7.5-1.4.9-2.2 1.2l-1.1 3.3h-5.8L12 25.3c-.8-.3-1.5-.7-2.2-1.2l-3.4.7-2.9-5 2.4-2.6a9.4 9.4 0 0 1 0-2.4l-2.4-2.6 2.9-5 3.4.7c.7-.5 1.4-.9 2.2-1.2l1.1-3.3h5.8Z" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linejoin="round" />
            </svg>
          </button>
        </header>

        <div class="content-stack">
          <section class="card profile-card" aria-label="프로필과 페이">
            <button class="profile-row" type="button">
              <span class="avatar" aria-hidden="true">
                <span class="avatar-head"></span>
                <span class="avatar-body"></span>
              </span>
              <span class="profile-name">민들레</span>
              <span class="temperature">38.4°C</span>
              <svg class="chevron" viewBox="0 0 24 24" aria-hidden="true">
                <path d="m9 5 7 7-7 7" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
            </button>

            <div class="pay-row">
              <div class="pay-brand" aria-label="당근페이">
                <span class="mini-carrot" aria-hidden="true"></span>
                <strong>pay</strong>
              </div>
              <button class="balance" type="button">
                <strong>0원</strong>
                <svg class="chevron" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="m9 5 7 7-7 7" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
              </button>
            </div>

            <div class="pay-actions" aria-label="페이 메뉴">
              <button type="button">충전</button>
              <button type="button">송금</button>
              <button type="button">당근카드</button>
            </div>
          </section>

          <section class="card service-card" aria-label="서비스">
            <h2>서비스</h2>
            <div class="service-grid">
              <a class="service-item" href="#">
                <svg class="service-icon orange" viewBox="0 0 48 48" aria-hidden="true">
                  <path d="M13 17h22l3 24H10l3-24Z" fill="currentColor" />
                  <path d="M17 18c0-7 4-11 7-11s7 4 7 11" fill="none" stroke="#ffb238" stroke-width="4" stroke-linecap="round" />
                  <path d="M20 28c1.4 2.2 6.6 2.2 8 0" fill="none" stroke="#fff" stroke-width="3.2" stroke-linecap="round" />
                </svg>
                <span>중고거래</span>
              </a>
              <a class="service-item" href="#">
                <svg class="service-icon orange" viewBox="0 0 48 48" aria-hidden="true">
                  <circle cx="22" cy="21" r="11" fill="none" stroke="currentColor" stroke-width="5" />
                  <path d="m31 30 8 8" fill="none" stroke="currentColor" stroke-width="5" stroke-linecap="round" />
                  <circle cx="22" cy="21" r="4" fill="currentColor" />
                </svg>
                <span>알바</span>
              </a>
              <a class="service-item" href="#">
                <svg class="service-icon pink" viewBox="0 0 48 48" aria-hidden="true">
                  <path d="m7 23 17-11 17 11v20H7V23Z" fill="currentColor" />
                  <path d="M17 29h4v4h-4zM27 29h4v4h-4z" fill="#fff" />
                  <path d="M24 13 8 23" fill="none" stroke="#f454c7" stroke-width="5" stroke-linecap="round" />
                </svg>
                <span>부동산</span>
              </a>
              <a class="service-item" href="#">
                <svg class="service-icon blue" viewBox="0 0 48 48" aria-hidden="true">
                  <path d="M10 25h28l-4-10H14l-4 10Z" fill="none" stroke="currentColor" stroke-width="5" stroke-linejoin="round" />
                  <path d="M8 25v12h8v-5h16v5h8V25" fill="currentColor" />
                  <circle cx="16" cy="31" r="3" fill="#fff" />
                  <circle cx="32" cy="31" r="3" fill="#fff" />
                </svg>
                <span>중고차</span>
              </a>
              <a class="service-item" href="#">
                <svg class="service-icon orange" viewBox="0 0 48 48" aria-hidden="true">
                  <path d="M14 26c0 8 5 14 10 14s10-6 10-14" fill="currentColor" />
                  <path d="M12 22c-4-2-5-7-2-10 4 1 7 4 8 8M36 22c4-2 5-7 2-10-4 1-7 4-8 8" fill="none" stroke="currentColor" stroke-width="5" stroke-linecap="round" />
                  <circle cx="17" cy="17" r="5" fill="currentColor" />
                  <circle cx="31" cy="17" r="5" fill="currentColor" />
                  <path d="M20 30c1.4 2 6.6 2 8 0" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" />
                </svg>
                <span>모임</span>
              </a>
              <a class="service-item" href="#">
                <svg class="service-icon red" viewBox="0 0 48 48" aria-hidden="true">
                  <circle cx="24" cy="24" r="17" fill="currentColor" />
                  <path d="m21 16 12 8-12 8V16Z" fill="#fff" />
                </svg>
                <span>스토리</span>
              </a>
            </div>
            <a class="see-all" href="#">
              <span>전체보기</span>
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="m9 5 7 7-7 7" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
            </a>
          </section>

          <section class="card trade-card" aria-label="나의 거래">
            <h2>나의 거래</h2>
            <a class="list-row" href="#">
              <svg viewBox="0 0 32 32" aria-hidden="true">
                <path d="M16 27s-10-6-10-14a6 6 0 0 1 10-4.4A6 6 0 0 1 26 13c0 8-10 14-10 14Z" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linejoin="round" />
              </svg>
              <span>관심목록</span>
              <svg class="chevron" viewBox="0 0 24 24" aria-hidden="true">
                <path d="m9 5 7 7-7 7" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
            </a>
            <a class="list-row" href="#">
              <svg viewBox="0 0 32 32" aria-hidden="true">
                <circle cx="16" cy="16" r="11.5" fill="none" stroke="currentColor" stroke-width="2.5" />
                <path d="M16 9v8l5 3" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
              <span>최근 본 게시글</span>
              <svg class="chevron" viewBox="0 0 24 24" aria-hidden="true">
                <path d="m9 5 7 7-7 7" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
            </a>
            <a class="list-row" href="#">
              <svg viewBox="0 0 32 32" aria-hidden="true">
                <path d="M8 5h16v23l-4-3-4 3-4-3-4 3V5Z" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linejoin="round" />
                <path d="M12 12h8M12 18h8" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" />
              </svg>
              <span>판매내역</span>
              <svg class="chevron" viewBox="0 0 24 24" aria-hidden="true">
                <path d="m9 5 7 7-7 7" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
            </a>
          </section>
        </div>

        <nav class="bottom-nav" aria-label="하단 메뉴">
          <a class="nav-item" href="#">
            <svg viewBox="0 0 32 32" aria-hidden="true">
              <path d="M5 14 16 5l11 9v13H9V16" fill="currentColor" />
            </svg>
            <span>홈</span>
          </a>
          <a class="nav-item" href="#">
            <svg viewBox="0 0 32 32" aria-hidden="true">
              <path d="M8 4h16v24H8z" fill="currentColor" />
              <path d="M13 10h6M13 17h8" fill="none" stroke="#fff" stroke-width="2.3" stroke-linecap="round" />
            </svg>
            <span>동네생활</span>
          </a>
          <a class="nav-item" href="#">
            <svg viewBox="0 0 32 32" aria-hidden="true">
              <path d="M16 29s10-8.6 10-17A10 10 0 1 0 6 12c0 8.4 10 17 10 17Z" fill="currentColor" />
            </svg>
            <span>동네지도</span>
          </a>
          <a class="nav-item chat" href="#">
            <span class="nav-icon-wrap">
              <svg viewBox="0 0 32 32" aria-hidden="true">
                <path d="M5 15.5C5 9.7 10 5 16 5s11 4.7 11 10.5S22 26 16 26c-1.3 0-2.6-.2-3.8-.7L7 27l1.6-4.6A10 10 0 0 1 5 15.5Z" fill="currentColor" />
              </svg>
              <strong>3</strong>
            </span>
            <span>채팅</span>
          </a>
          <a class="nav-item active" href="#" aria-current="page">
            <svg viewBox="0 0 32 32" aria-hidden="true">
              <circle cx="16" cy="10" r="6" fill="currentColor" />
              <path d="M5 29c1.4-7 6-11 11-11s9.6 4 11 11H5Z" fill="currentColor" />
            </svg>
            <span>나의 당근</span>
          </a>
        </nav>
      </section>
    </main>

    <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
    <script src="./daangn.js"></script>
  </body>
</html>
